<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고릴라 바나나</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #4a8c2a;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #btn-main {
      position: fixed;
      top: 14px;
      right: 16px;
      z-index: 300;
      padding: 8px 18px;
      background: rgba(0,0,0,0.55);
      color: white;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 10px;
      font-size: 0.95em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    #btn-main:hover { background: rgba(0,0,0,0.8); }

    #hud {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 100;
    }

    #score {
      font-size: 2em;
      font-weight: bold;
      color: white;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
    }

    #power-timer {
      font-size: 1.1em;
      color: #ffe44d;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
      display: none;
      margin-top: 4px;
    }

    #gorilla {
      position: fixed;
      font-size: 2.5em;
      user-select: none;
      z-index: 10;
      transition: font-size 0.3s ease;
    }

    #gorilla.powered { font-size: 5em; }

    .banana {
      position: fixed;
      font-size: 2em;
      user-select: none;
      z-index: 10;
    }

    .banana.red {
      filter: hue-rotate(300deg) saturate(4) brightness(1.1);
      animation: pulse 0.7s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.3); }
    }

    .lion {
      position: fixed;
      font-size: 2.5em;
      user-select: none;
      z-index: 10;
    }

    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    #overlay.show { display: flex; }

    #message-box {
      background: rgba(0,0,0,0.9);
      color: white;
      font-size: 1.8em;
      padding: 40px 60px;
      border-radius: 20px;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <a id="btn-main" href="index.html">← main</a>

  <div id="hud">
    <div id="score">점수: 0</div>
    <div id="power-timer">⚡ 파워업! <span id="countdown">10</span>초</div>
  </div>

  <div id="gorilla">🦍</div>

  <div id="overlay">
    <div id="message-box"></div>
  </div>

  <script>
    const gorillaEl    = document.getElementById('gorilla');
    const scoreEl      = document.getElementById('score');
    const powerTimerEl = document.getElementById('power-timer');
    const countdownEl  = document.getElementById('countdown');
    const overlay      = document.getElementById('overlay');
    const messageBox   = document.getElementById('message-box');

    const SPEED      = 8;
    const LION_SPEED = 1.8;

    let gx = 60, gy = window.innerHeight - 80;
    let score = 0;
    let paused = false;
    let powered = false;
    let powerTimeout = null;
    let powerInterval = null;

    const bananas = [];
    const lions   = [];
    const keys    = {};

    function init() {
      paused  = false;
      score   = 0;
      powered = false;
      gx = 60; gy = window.innerHeight - 80;
      gorillaEl.style.left = gx + 'px';
      gorillaEl.style.top  = gy + 'px';
      gorillaEl.classList.remove('powered');
      scoreEl.textContent = '점수: 0';
      powerTimerEl.style.display = 'none';
      clearTimeout(powerTimeout);
      clearInterval(powerInterval);
      overlay.classList.remove('show');
      spawnBananas();
      resetLions();
    }

    function spawnBananas() {
      bananas.forEach(b => b.el.remove());
      bananas.length = 0;
      const count = Math.floor(Math.random() * 6) + 5;
      for (let i = 0; i < count; i++) addBanana(false);
      addBanana(true);
    }

    function addBanana(isRed) {
      const el = document.createElement('div');
      el.className = 'banana' + (isRed ? ' red' : '');
      el.textContent = '🍌';
      let bx, by;
      do {
        bx = Math.random() * (window.innerWidth  - 80) + 20;
        by = Math.random() * (window.innerHeight - 130) + 80;
      } while (Math.hypot(bx - gx, by - gy) < 120);
      el.style.left = bx + 'px';
      el.style.top  = by + 'px';
      document.body.appendChild(el);
      bananas.push({ el, x: bx, y: by, isRed });
    }

    function resetLions() {
      lions.forEach(l => { clearTimeout(l.respawnTimeout); l.el.remove(); });
      lions.length = 0;
      for (let i = 0; i < 2; i++) {
        const el = document.createElement('div');
        el.className = 'lion';
        el.textContent = '🦁';
        document.body.appendChild(el);
        const lion = { el, x: 0, y: 0, dead: false, respawnTimeout: null };
        lions.push(lion);
        placeLionAtEdge(lion);
      }
    }

    function placeLionAtEdge(lion) {
      const edge = Math.floor(Math.random() * 4);
      let lx, ly;
      if      (edge === 0) { lx = 0;                       ly = Math.random() * window.innerHeight; }
      else if (edge === 1) { lx = window.innerWidth  - 50; ly = Math.random() * window.innerHeight; }
      else if (edge === 2) { lx = Math.random() * window.innerWidth; ly = 0; }
      else                 { lx = Math.random() * window.innerWidth; ly = window.innerHeight - 55; }
      lion.x = lx; lion.y = ly;
      lion.dead = false;
      lion.el.style.display = 'block';
      lion.el.style.left = lx + 'px';
      lion.el.style.top  = ly + 'px';
    }

    function killLion(lion) {
      lion.dead = true;
      lion.el.style.display = 'none';
      lion.respawnTimeout = setTimeout(() => placeLionAtEdge(lion), 5000);
    }

    function activatePower() {
      powered = true;
      gorillaEl.classList.add('powered');
      let sec = 10;
      countdownEl.textContent = sec;
      powerTimerEl.style.display = 'block';
      clearTimeout(powerTimeout);
      clearInterval(powerInterval);
      powerInterval = setInterval(() => {
        sec--;
        countdownEl.textContent = sec;
        if (sec <= 0) clearInterval(powerInterval);
      }, 1000);
      powerTimeout = setTimeout(() => {
        powered = false;
        gorillaEl.classList.remove('powered');
        powerTimerEl.style.display = 'none';
      }, 10000);
    }

    function overlap(a, b) {
      return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
    }

    function checkCollisions() {
      const gr = gorillaEl.getBoundingClientRect();

      for (let i = bananas.length - 1; i >= 0; i--) {
        if (!overlap(gr, bananas[i].el.getBoundingClientRect())) continue;
        const { isRed } = bananas[i];
        bananas[i].el.remove();
        bananas.splice(i, 1);
        if (isRed) {
          activatePower();
        } else {
          score += 10;
          scoreEl.textContent = '점수: ' + score;
        }
        if (bananas.filter(b => !b.isRed).length === 0 && !paused) {
          triggerWin(); return;
        }
      }

      for (const lion of lions) {
        if (lion.dead) continue;
        if (!overlap(gr, lion.el.getBoundingClientRect())) continue;
        if (powered) { killLion(lion); }
        else { triggerGameOver(); return; }
      }
    }

    function showMessage(html, onDone) {
      paused = true;
      messageBox.innerHTML = html;
      overlay.classList.add('show');
      setTimeout(onDone, 3000);
    }

    function triggerWin() {
      showMessage(
        '🎉 바나나를 모두 수집했습니다! 🎉<br>점수: ' + score +
        '<br><small style="font-size:0.55em">잠시 후 다시 시작...</small>', init);
    }

    function triggerGameOver() {
      showMessage(
        '💀 게임 오버! 💀<br>점수: ' + score +
        '<br><small style="font-size:0.55em">잠시 후 다시 시작...</small>', init);
    }

    function moveLions() {
      for (const lion of lions) {
        if (lion.dead) continue;
        const dx = gx - lion.x, dy = gy - lion.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 1) {
          lion.x += (dx / dist) * LION_SPEED;
          lion.y += (dy / dist) * LION_SPEED;
          lion.el.style.left = lion.x + 'px';
          lion.el.style.top  = lion.y + 'px';
        }
      }
    }

    document.addEventListener('keydown', e => {
      if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
      keys[e.key] = true;
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    function gameLoop() {
      if (!paused) {
        if (keys['ArrowLeft'])  gx = Math.max(0, gx - SPEED);
        if (keys['ArrowRight']) gx = Math.min(window.innerWidth  - 50, gx + SPEED);
        if (keys['ArrowUp'])    gy = Math.max(0, gy - SPEED);
        if (keys['ArrowDown'])  gy = Math.min(window.innerHeight - 55, gy + SPEED);
        gorillaEl.style.left = gx + 'px';
        gorillaEl.style.top  = gy + 'px';
        moveLions();
        checkCollisions();
      }
      requestAnimationFrame(gameLoop);
    }

    init();
    gameLoop();
  </script>
</body>
</html>

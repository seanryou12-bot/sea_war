<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>벽돌깨기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    #btn-main {
      position: fixed;
      top: 14px;
      right: 16px;
      padding: 8px 18px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 10px;
      font-size: 0.95em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    #btn-main:hover { background: rgba(255,255,255,0.2); }

    .icon { font-size: 5em; margin-bottom: 24px; }

    h1 {
      font-size: 3em;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
      margin-bottom: 16px;
    }

    p {
      font-size: 1.2em;
      color: #aaa;
    }
  </style>
</head>
<body>

  <a id="btn-main" href="index.html">← main</a>

  <div class="icon">🧱</div>
  <h1>벽돌깨기</h1>
  <p>🚧 준비 중입니다...</p>

</body>
</html>

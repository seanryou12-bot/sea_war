<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신니의 게임 홈피</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    header {
      margin-top: 60px;
      text-align: center;
    }

    header h1 {
      font-size: 3em;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255,255,255,0.4);
    }

    header p {
      margin-top: 10px;
      font-size: 1.1em;
      color: #aaa;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
      margin-top: 60px;
      padding: 0 24px 60px;
    }

    .card {
      width: 260px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 36px 24px 28px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: white;
      display: block;
    }

    .card:hover {
      transform: translateY(-8px);
      background: rgba(255,255,255,0.14);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }

    .card .icon {
      font-size: 4em;
      margin-bottom: 16px;
      display: block;
    }

    .card h2 {
      font-size: 1.4em;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 0.9em;
      color: #bbb;
      line-height: 1.5;
    }

    .card .badge {
      display: inline-block;
      margin-top: 16px;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.75em;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .badge.ready  { background: #2ecc71; color: #000; }
    .badge.coming { background: #555;    color: #ccc; }
  </style>
</head>
<body>

  <header>
    <h1>🎮 신니의 게임 홈피</h1>
    <p>플레이하고 싶은 게임을 선택하세요</p>
  </header>

  <div class="cards">

    <a class="card" href="gorilla.html">
      <span class="icon">🦍</span>
      <h2>고릴라 바나나</h2>
      <p>방향키로 고릴라를 움직여 바나나를 모두 수집하세요. 사자를 조심!</p>
      <span class="badge ready">PLAY</span>
    </a>

    <a class="card" href="breakout.html">
      <span class="icon">🧱</span>
      <h2>벽돌깨기</h2>
      <p>클래식 벽돌깨기 게임. 공을 튕겨서 모든 벽돌을 부숴보세요!</p>
      <span class="badge coming">COMING SOON</span>
    </a>

  </div>

</body>
</html>

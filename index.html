<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신니의 홈피</title>
  <style>
    .blink {
      color: red;
      font-size: 3em;
      animation: blink 0.5s step-start infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <h1>반갑습니다 여기는 신니의 홈피에요</h1>
  <h1 class="blink">오늘 전교1등했어요!! 노동현 만세!!</h1>
</body>
</html>

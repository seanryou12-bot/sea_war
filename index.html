<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신니의 홈피</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #5a9e3a;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #score {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2em;
      font-weight: bold;
      color: white;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
      z-index: 100;
    }

    #gorilla {
      position: fixed;
      font-size: 2.5em;
      user-select: none;
      z-index: 10;
    }

    .banana {
      position: fixed;
      font-size: 2em;
      user-select: none;
      z-index: 10;
    }

    #message {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      color: white;
      font-size: 1.8em;
      padding: 40px 60px;
      border-radius: 20px;
      text-align: center;
      z-index: 200;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div id="score">점수: 0</div>
  <div id="gorilla">🦍</div>
  <div id="message"></div>

  <script>
    const gorilla = document.getElementById('gorilla');
    const scoreEl = document.getElementById('score');
    const messageEl = document.getElementById('message');

    let x = 20;
    let y = window.innerHeight - 80;
    let score = 0;
    let paused = false;
    const speed = 8;
    const bananas = [];

    gorilla.style.left = x + 'px';
    gorilla.style.top = y + 'px';

    function spawnBananas() {
      document.querySelectorAll('.banana').forEach(b => b.remove());
      bananas.length = 0;

      const count = Math.floor(Math.random() * 6) + 5;
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'banana';
        el.textContent = '🍌';
        const bx = Math.random() * (window.innerWidth - 80) + 20;
        const by = Math.random() * (window.innerHeight - 120) + 70;
        el.style.left = bx + 'px';
        el.style.top = by + 'px';
        document.body.appendChild(el);
        bananas.push({ el, x: bx, y: by });
      }
    }

    function checkCollision() {
      const gRect = gorilla.getBoundingClientRect();
      for (let i = bananas.length - 1; i >= 0; i--) {
        const bRect = bananas[i].el.getBoundingClientRect();
        if (
          gRect.left < bRect.right &&
          gRect.right > bRect.left &&
          gRect.top < bRect.bottom &&
          gRect.bottom > bRect.top
        ) {
          bananas[i].el.remove();
          bananas.splice(i, 1);
          score += 10;
          scoreEl.textContent = '점수: ' + score;

          if (score >= 50) {
            paused = true;
            messageEl.innerHTML = '🎉 축하합니다! 50점 달성! 🎉<br><small style="font-size:0.6em">잠시 후 게임을 다시 시작합니다...</small>';
            messageEl.style.display = 'block';
            setTimeout(() => {
              score = 0;
              scoreEl.textContent = '점수: 0';
              x = 20;
              y = window.innerHeight - 80;
              gorilla.style.left = x + 'px';
              gorilla.style.top = y + 'px';
              messageEl.style.display = 'none';
              spawnBananas();
              paused = false;
            }, 3000);
          }
        }
      }
    }

    const keys = {};

    document.addEventListener('keydown', e => {
      if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
        e.preventDefault();
      }
      keys[e.key] = true;
    });

    document.addEventListener('keyup', e => {
      keys[e.key] = false;
    });

    function gameLoop() {
      if (!paused) {
        if (keys['ArrowLeft'])  x = Math.max(0, x - speed);
        if (keys['ArrowRight']) x = Math.min(window.innerWidth - 50, x + speed);
        if (keys['ArrowUp'])    y = Math.max(0, y - speed);
        if (keys['ArrowDown'])  y = Math.min(window.innerHeight - 55, y + speed);

        gorilla.style.left = x + 'px';
        gorilla.style.top = y + 'px';

        checkCollision();
      }
      requestAnimationFrame(gameLoop);
    }

    spawnBananas();
    gameLoop();
  </script>
</body>
</html>
